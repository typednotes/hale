name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          build: false
      - name: Build FFI
        run: bash ffi/build.sh
      - name: Build library
        run: lake build
      - name: Build tests
        run: lake build hale-tests
      - name: Run tests
        run: lake exe hale-tests
